services:

  # ── PostgreSQL 18 + pgvector ──────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: grindvac-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grindvac}
      POSTGRES_USER: ${POSTGRES_USER:-grindvac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grindvac} -d ${POSTGRES_DB:-grindvac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (брокер для arq) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grindvac-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Scraper — сбор данных (Network I/O-bound) ──────────────────
  scraper:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/scraper/Dockerfile
    container_name: grindvac-scraper
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
    volumes:
      - ./services/scraper/selectors.json:/app/selectors.json:ro
      - ./services/scraper/search_queries.json:/app/search_queries.json:ro
    command: ["python", "-m", "src.main"]

  # ── Transformer — фильтрация и эмбеддинги (CPU-bound) ──────────
  transformer:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/transformer/Dockerfile
      args:
        - HF_TOKEN
    container_name: grindvac-transformer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      HF_TOKEN: ${HF_TOKEN:-}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:?SIMILARITY_THRESHOLD is required}
      RESUME_PATH: ${RESUME_PATH:-/app/resume.txt}
    volumes:
      - ./shared/resume.txt:/app/resume.txt:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── Analyzer — ИИ-анализ (Network I/O-bound) ───────────────────
  analyzer:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/analyzer/Dockerfile
    container_name: grindvac-analyzer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-4o-mini}
      AI_SCORE_THRESHOLD: ${AI_SCORE_THRESHOLD:?AI_SCORE_THRESHOLD is required}
      RESUME_PATH: ${RESUME_PATH:-/app/resume.txt}
    volumes:
      - ./shared/resume.txt:/app/resume.txt:ro

  # ── Telegram Bot — уведомления и inline-кнопки ──────────────────
  telegram_bot:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/telegram_bot/Dockerfile
    container_name: grindvac-telegram-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_USER_ID: ${TELEGRAM_USER_ID:?TELEGRAM_USER_ID is required}
    restart: unless-stopped

  # ── Telegram Monitor — мониторинг каналов с вакансиями ──────────
  telegram_monitor:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/telegram_monitor/Dockerfile
    container_name: grindvac-telegram-monitor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      TELETHON_API_ID: ${TELETHON_API_ID:?TELETHON_API_ID is required}
      TELETHON_API_HASH: ${TELETHON_API_HASH:?TELETHON_API_HASH is required}
      TELETHON_SESSION: /app/data/session
    volumes:
      - ./services/telegram_monitor/data:/app/data:rw
    restart: unless-stopped

  # ── Dashboard — визуализация (Streamlit) ────────────────────────
  dashboard:
    profiles: ["app"]
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: grindvac-dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
    ports:
      - "127.0.0.1:8501:8501"

volumes:
  postgres_data:
  redis_data: